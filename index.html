<!DOCTYPE html>
<html>
<head>
  <title>Gaming Community Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    :root {
      --bg-start: #0f2027;
      --bg-end: #2c5364;
      --text: white;
      --accent: #00ffe0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      padding: 90px 20px 70px;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 20px;
      backdrop-filter: blur(15px);
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      background: var(--accent);
      color: black;
      box-shadow: 0 0 10px var(--accent);
    }

    h1 {
      font-size: clamp(28px, 6vw, 60px);
      text-align: center;
      margin-bottom: 25px;
      font-family: 'Orbitron', sans-serif;
    }

    .btn-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      color: white;
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    .levi {
      background: linear-gradient(45deg, #5865F2, #7289da);
      box-shadow: 0 0 10px #5865F2;
    }

    .discord {
      background: linear-gradient(45deg, #2ecc71, #27ae60);
      box-shadow: 0 0 10px #2ecc71;
    }

    /* 🏆 MINI LEADERBOARD */
    .mini-leaderboard {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 240px;
      background: rgba(0,0,0,0.65);
      border: 1px solid #00ffe0;
      border-radius: 14px;
      padding: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(0,255,224,0.3);
      z-index: 999;
    }

    .ml-title {
      font-family: 'Orbitron', sans-serif;
      color: #00ffe0;
      text-align: center;
      margin-bottom: 10px;
      font-size: 16px;
      text-shadow: 0 0 10px #00ffe0;
    }

    .ml-item {
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      opacity: 0.9;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: rgba(0,0,0,0.4);
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <div class="title">🎮 Gaming Community</div>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="events.html">Events</a>
    <a href="staff.html">Staff</a>
    <a href="rules.html">Rules</a>
  </nav>
</header>

<h1>Welcome Gamer 🎮</h1>

<div class="btn-container">
  <button class="btn levi" onclick="alert('Go to your page')">Levi Hunt</button>

  <a href="https://discord.gg/exH5gwGP3U" target="_blank">
    <button class="btn discord">Join Discord</button>
  </a>
</div>

<!-- 🏆 MINI LEADERBOARD -->
<div class="mini-leaderboard">
  <div class="ml-title">🏆 Top Players</div>
  <div id="board">Loading...</div>
</div>

<footer>
  © 2026 EzGamer | All Rights Reserved
</footer>

<script>
const API = "http://localhost:3000/leaderboard";

async function loadLeaderboard() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const board = document.getElementById("board");

    if (!Array.isArray(data) || data.length === 0) {
      board.innerHTML = "<div class='ml-item'>No data yet</div>";
      return;
    }

    board.innerHTML = data
      .slice(0, 5)
      .map((u, i) =>
        `<div class="ml-item">${i + 1}. ${u.name} - XP ${u.xp}</div>`
      )
      .join("");

  } catch (err) {
    document.getElementById("board").innerHTML =
      "<div class='ml-item'>Backend not connected</div>";
  }
}

loadLeaderboard();
setInterval(loadLeaderboard, 5000);
</script>

</body>
</html>
